name: Sync content

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync tweets from X
        run: node scripts/sync-tweets.js
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      - name: Commit if tweets.json changed
        id: commit
        run: |
          if [[ -n "$(git status --porcelain src/data/tweets.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/tweets.json
            git commit -m "chore: sync tweets"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Cloudflare deploy (if nothing pushed)
        if: steps.commit.outputs.pushed == 'false' && env.CF_DEPLOY_HOOK != ''
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$CF_DEPLOY_HOOK"
